spring.application.name=fitness-monolith

# Database Configuration (MySQL)
# If running locally, the URL usually looks like this:
spring.datasource.url=jdbc:mysql://localhost:3307/fitness_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

# Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Spring AI Configuration (Required for your AI service to start)
# Spring AI Configuration (Bypassing OpenAI to use Gemini)
# Spring AI Configuration (Bypassing OpenAI to use Groq)
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile

# Logging levels
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG